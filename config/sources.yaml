# Default registry of audit report sources.
# Add a new source by appending an entry here; `type` selects the scraper:
#   github_repo — enumerate report files in a public GitHub repo
#   <custom>    — a dedicated scraper in src/audit_collector/scrapers/<type>.py
#
# Common fields:
#   name        — display name
#   listing_url — human-facing page where reports are listed (provenance)
#
# github_repo fields:
#   repo        — owner/repo
#   paths       — restrict to these subdirectories (empty/omitted = whole repo)
#   extensions  — report file extensions (default: [.pdf])
#   exclude     — filename substrings to skip (case-insensitive)

chainsecurity:
  name: ChainSecurity
  type: chainsecurity
  listing_url: https://www.chainsecurity.com/smart-contract-audit-reports

trailofbits:
  name: Trail of Bits
  type: github_repo
  listing_url: https://github.com/trailofbits/publications
  repo: trailofbits/publications
  paths: [reviews]

mixbytes:
  name: MixBytes
  type: github_repo
  listing_url: https://github.com/mixbytes/audits_public
  repo: mixbytes/audits_public
  extensions: [.pdf]

certora:
