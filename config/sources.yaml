  type: github_repo
  listing_url: https://github.com/Certora/SecurityReports
  repo: Certora/SecurityReports

spearbit:
  name: Spearbit
  type: github_repo
  listing_url: https://github.com/spearbit/portfolio
  repo: spearbit/portfolio
  paths: [pdfs]

